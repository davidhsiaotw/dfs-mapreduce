syntax = "proto3";
package mapreduce;
option go_package = "./messages";

message Response {
    bool ok = 1;
    string message = 2;
}

message JobRequest {
    repeated string input_files = 1;
    bytes job_binary = 2; // .so or executable
    uint32 num_reducers = 3;
}

message JobResponse {
    Response resp = 1;
    string job_id = 2;
}

message WorkerInfo {
    string id = 1;
    string address = 2;
    uint32 cpu_load = 3;
    uint32 mem_load = 4;
    uint32 active_tasks = 5;
}

message Heartbeat {
    WorkerInfo worker = 1;
}

enum TaskType {
    MAP = 0;
    REDUCE = 1;
}

message TaskAssignment {
    string job_id = 1;
    string task_id = 2;
    TaskType type = 3;
    string input_file = 4;
    uint64 chunk_id = 5;
    bytes job_binary = 6;
    uint32 num_reducers = 7;
    uint32 reducer_id = 8; // For REDUCE tasks
    map<string, string> map_task_info = 9; // For REDUCE tasks
}

message TaskReport {
    string job_id = 1;
    string task_id = 2;
    bool success = 3;
    string message = 4;
    repeated uint64 reduce_data = 5;
}

message FetchIntermediateRequest {
    string job_id = 1;
    uint32 reducer_id = 2;
    string task_id = 3;
}

message JobProgress {
    string job_id = 1;
    string phase = 2;
    uint32 completed_tasks = 3;
    uint32 total_tasks = 4;
    bool is_complete = 5;
    bool is_error = 6;
    string message = 7;
}

message MapReduceWrapper {
    oneof msg {
        Response response = 1;
        JobRequest job_req = 2;
        JobResponse job_resp = 3;
        Heartbeat heartbeat = 4;
        TaskAssignment task_assign = 5;
        TaskReport task_report = 6;
        FetchIntermediateRequest fetch_inter = 7;
        JobProgress job_progress = 8;
    }
}
