syntax = "proto3";
package mapreduce;
option go_package = "./messages";

message Response {
    bool ok = 1;
    string message = 2;
}

message JobRequest {
    repeated string input_files = 1;
    bytes job_binary = 2; // .so or executable
}

message JobResponse {
    Response resp = 1;
    string job_id = 2;
}

message WorkerInfo {
    string id = 1;
    string address = 2;
    uint32 cpu_load = 3;
    uint32 mem_load = 4;
    uint32 active_tasks = 5;
}

message Heartbeat {
    WorkerInfo worker = 1;
}

enum TaskType {
    MAP = 0;
    REDUCE = 1;
}

message MapReduceWrapper {
    oneof msg {
        Response response = 1;
        JobRequest job_req = 2;
        JobResponse job_resp = 3;
        Heartbeat heartbeat = 4;
    }
}
